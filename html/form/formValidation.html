<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
  </head>
  <body>
    <form autocomplete="off">
      <label for="firstName">First Name *:</label>
      <input
        type="text"
        name="firstName"
        id="firstName"
        minlength="3"
        maxlength="10"
        required
      /><br /><br />

      <label for="lastName">Last Name:</label>
      <input
        type="text"
        name="lastName"
        id="lastName"
        readonly
        value="Frontend"
      /><br /><br />
      <label for="city">City:</label>
      <input
        type="text"
        name="city"
        id="city"
        disabled
        value="cityValue"
      /><br /><br />

      <label for="email">Email:</label>
      <input type="email" name="email" id="email" /><br /><br />

      <label for="username">Username:</label>
      <input
        type="email"
        name="username"
        id="username"
        placeholder="Enter your username"
        autofocus
      /><br /><br />

      <label for="age">Age:</label>
      <input type="number" name="age" id="age" min="0" max="10" /><br /><br />

      <label for="mobile">Mobile</label>
      <input type="tel" name="mobile" id="mobile" pattern="[0-9]{10}" />
      <br /><br />
      <label for="password">Password:</label>
      <input
        type="password"
        name="password"
        id="password"
        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
        title="Password must be at least 8 characters long and include uppercase, lowercase, a number, and a special character."
      />
      <br />
      <button>Send</button>
    </form>
  </body>
</html>
