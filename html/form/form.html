<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
  </head>
  <body>
    <!-- input type=>
    text, email, password, radio, checkbox, color, number, date, month, week, file, etc.... 
    -->
    <form>
      <fieldset>
        <legend>Registration Form</legend>
        <!-- text -->
        <label for="fname">FirstName:</label>
        <input type="text" name="firstname" id="fname" placeholder="Enter your firstname" />
        <hr />

        <label for="lname">LastName:</label>
        <input type="text" name="lastname" id="lname" placeholder="Enter your lastname"/>
        <hr />
        <!-- number -->
        <label for="age1">Age:</label>
        <input type="number" name="age" id="age1" min="0" max="110" placeholder="age"/>
        <hr />

        <!-- email -->
        <label for="email">Email:</label>
        <input type="email" name="email" id="email"  placeholder="abc@gmail.com"/>
        <hr />
        <!-- password -->
        <label for="pass">Password:</label>
        <input type="password" name="password" id="pass" />
        <hr />

        <!-- color -->
        <label for="color">Color:</label>
        <input type="color" name="color" id="color" />
        <hr />
        <!-- tel -->
        <label for="phone">Contact:</label>
        <input type="tel" name="contact" id="phone" />
        <hr />
        <label></label>
        <!-- date -->
        <label for="date">Date:</label>
        <input type="date" name="date" id="date" />
        <hr />
        <!-- datetime-local -->
        DateTime:<input type="datetime-local" name="datetime" id="" />
        <hr />
        <!-- month -->
        Week: <input type="week" name="week" id="" />
        <hr />
        MOnth: <input type="month" name="month" id="" />
        <hr />

        <!-- Gender : Male Female other -->
        <!-- radio -->
        <p>Gender:</p>
        <input type="radio" name="gender" id="male" value="male" /><label
          for="male"
          >Male</label
        >
        <input type="radio" name="gender" id="female" value="female" /><label
          for="female"
          >Female</label
        >
        <input type="radio" name="gender" id="other" value="other" />
        <label for="other">Other</label>
        <hr />
        <!-- checkbox -->
        <p>Programming Language:</p>
        <input type="checkbox" name="language" id="c" value="c" />
        <label for="c">C</label><br />

        <input type="checkbox" name="language" id="c++" value="c++" />
        <label for="c++">C++</label><br />

        <input
          type="checkbox"
          name="language"
          id="javascript"
          value="javascript"
        />
        <label for="javascript">JavaScript</label>
        <hr />
        <!-- select option -->
        <!-- {lable:html, value:course} -->
        <label for="course">Select Course</label>
        <select name="course" id="course" multiple size="3">
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="js">JavaScript</option>
          <option value="reactjs" selected>Reactjs</option>
          <option value="nextjs">Nextjs</option>
        </select>
        <hr />

        <!-- select, optgroup option -->
        <label for="techStack">Tech Stack:</label>
        <select name="techstack">
          <optgroup label="frontend">
            <option value=" html">HTML</option>
            <option value="css">CSS</option>
            <option value="js">JavaScript</option>
            <option value="reactjs">Reactjs</option>
          </optgroup>
          <optgroup label="backend">
            <option value="express">Expressjs</option>
            <option value="java">Java</option>
            <option value="php">PHP</option>
          </optgroup>
        </select>
        <hr />
        <!-- datalist -->
        <label for="country">Select Country:</label>
        <input type="text" name="country" id="country" list="listCountry" />
        <datalist id="listCountry">
          <option value="Nepal"></option>
          <option value="India"></option>
          <option value="Pakistan"></option>
          <option value="Bangladesh"></option>
        </datalist>

        <hr />
        <!-- file -->
        <label for="file">File:</label>
        <input type="file" name="file" id="" />
        <hr />
        <!-- url -->
        Url: <input type="url" name="url" id="" />
        <hr />
        <!-- time -->
        time:<input type="time" name="" id="" />
        <hr />
        <!-- textarea -->
        <label for="description">Description:</label>
        <textarea name="description" id="" rows="10" cols="50"></textarea>
        <hr />
        <button>Send</button>
      </fieldset>
    </form>
  </body>
</html>
