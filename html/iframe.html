<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iFrame</title>
  </head>
  <body>
    <!-- google map -->
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3533.036694671827!2d85.30454107626268!3d27.68526072619523!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39eb184912a56fef%3A0x5980611bc24818a9!2sSanepa%20Chowk%2C%20Lalitpur%2044600!5e0!3m2!1sen!2snp!4v1784166692231!5m2!1sen!2snp"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <hr />

    <!-- youtube -->
    <iframe
      width="1331"
      height="749"
      src="https://www.youtube.com/embed/BAx2GaMW2qA"
      title="Learn HTML video in 4 minutes! 🎥"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <hr />

    <!-- news -->
    <iframe
      src="https://www.onlinekhabar.com/"
      width="100%"
      height="500"
    ></iframe>
    <hr />
  </body>
</html>
