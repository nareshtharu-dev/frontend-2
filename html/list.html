<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List</title>
  </head>
  <body>
    <!-- List
    3 types 
    1. Order list (1, 2, 3)(a, b, c, etc.), (i, ii, iii, iv....)
    2. Unorder list (circe, disc, square)
    3. Description List (dl, dt, dd)
    -->
    <h1>Order List</h1>
    <!--type= Default ===> numbering=1, a, A, i, I -->
    <ol type="a">
      <li>HTML</li>
      <li>CSS</li>
      <li>TailwindCSS</li>
      <li>JavaScript</li>
      <li>Reactjs</li>
      <li>Nextjs</li>
    </ol>
    <ol type="a" start="7">
        <li>C</li>
        <li>Java</li>
    </ol>
  </body>
</html>
